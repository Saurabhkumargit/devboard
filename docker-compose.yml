version: "3.9"

services:
  api:
    build: .
    container_name: devboard-api
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/devboard
      REDIS_URL: redis://redis:6379

  db:
    image: postgres:15-alpine
    container_name: devboard-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: devboard
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: devboard-redis

volumes:
  postgres_data: