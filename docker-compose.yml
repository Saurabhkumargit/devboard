services:
  api:
    build: .
    container_name: devboard-api
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env

  db:
    image: postgres:15-alpine
    container_name: devboard-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: devboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d devboard"]
      interval: 5s
      timeout: 5s
      retries: 5  

  redis:
    image: redis:7-alpine
    container_name: devboard-redis

volumes:
  postgres_data: